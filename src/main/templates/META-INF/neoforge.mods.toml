modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"
issueTrackerURL="https://github.com/FabricMC/fabric-example-mod"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
# Client-only mod: don't reject servers (or other clients) that lack it during the version handshake.
displayTest="IGNORE_ALL_VERSION"
authors="Remote Access"
description='''
Tab between nearby workstations without closing the screen. While a workstation GUI is open, press a key (A/D by default) to switch to the previous/next nearby crafting interface. Switching replays a genuine block-use interaction within reach, so any vanilla-behaving server accepts it — no server mod required.
'''
logoFile="assets/remoteaccess/icon.png"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="CLIENT"
